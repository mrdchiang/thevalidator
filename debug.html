<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 Debug Console — Error Viewer</title>
<style>
:root {
  --bg: #060b18; --surface: #0c1225; --elevated: #111830;
  --border: #1a2540; --text: #e8ecf4; --muted: #556888;
  --accent: #0066ff; --accent-dim: #0052cc; --accent-glow: rgba(0,102,255,0.25);
  --critical: #ff4444; --high: #ff7722; --medium: #e6b800; --low: #22cc66;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: "SF Mono", "Fira Code", Consolas, monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);padding:24px}
.container{max-width:960px;margin:0 auto}
h1{font-size:28px;font-weight:700;margin-bottom:4px;letter-spacing:-0.5px}
h1 span{color:var(--accent)}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.btn{background:var(--elevated);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.btn:hover{border-color:var(--accent);background:var(--surface)}
.btn-danger{border-color:var(--critical);color:var(--critical)}
.btn-danger:hover{background:var(--critical);color:#fff}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dim)}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;margin-left:6px}
.badge-error{background:#351520;color:var(--critical)}
.badge-warn{background:#352215;color:var(--high)}
.badge-ok{background:#123020;color:var(--low)}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;margin-bottom:2px}
.stat-card .lbl{font-size:11px;color:var(--muted)}

/* Error log table */
.error-table{width:100%;border-collapse:collapse;background:var(--elevated);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.error-table th{background:var(--surface);padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
.error-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top}
.error-table tr:hover td{background:var(--surface)}
.error-table tr:last-child td{border-bottom:none}
.error-msg{font-weight:600;color:var(--critical);word-break:break-word}
.error-msg.warn{color:var(--high)}
.error-msg.info{color:var(--text)}
.error-meta{font-size:10px;color:var(--muted);margin-top:2px}
.error-stack{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:4px;max-height:80px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;background:rgba(0,0,0,0.3);padding:6px;border-radius:4px;display:none}
.error-table tr.expanded .error-stack{display:block}
.stack-toggle{cursor:pointer;color:var(--accent);font-size:10px;text-decoration:underline;margin-left:4px}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;margin-bottom:4px}
.empty-state .sub{font-size:11px;color:var(--muted)}

/* Filters */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-bar select{background:var(--elevated);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;font-family:var(--font);cursor:pointer}
.filter-bar select:focus{outline:none;border-color:var(--accent)}

/* Detail panel */
.detail-panel{display:none;background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.detail-panel.visible{display:block}
.detail-panel h3{font-size:14px;font-weight:600;margin-bottom:12px}
.detail-panel .row{display:flex;padding:4px 0;font-size:12px}
.detail-panel .label{color:var(--muted);width:120px;flex-shrink:0}
.detail-panel .value{color:var(--text);word-break:break-all;font-family:var(--font-mono);font-size:11px}
.detail-panel .value.long{max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.3);padding:8px;border-radius:4px;white-space:pre-wrap}

.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--muted)}
@media(max-width:640px){
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .error-table{font-size:11px}
}
</style>
</head>
<body>
<div class="container">
  <h1>🔍 <span>Debug</span> Console</h1>
  <div class="subtitle" id="page-subtitle">Error log viewer for Security Tools — all tools share one localStorage log</div>

  <!-- Summary stats -->
  <div class="summary-grid" id="summary"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" onclick="refreshLog()">🔄 Refresh</button>
    <button class="btn btn-danger" onclick="clearLog()">🗑️ Clear Log</button>
    <button class="btn" onclick="downloadLog()">⬇️ Download</button>
    <span style="font-size:11px;color:var(--muted);margin-left:8px" id="log-count"></span>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <select id="filter-tool" onchange="renderErrors()">
      <option value="">All Tools</option>
    </select>
    <select id="filter-type" onchange="renderErrors()">
      <option value="">All Types</option>
      <option value="runtime-error">Runtime Error</option>
      <option value="unhandled-rejection">Promise Rejection</option>
      <option value="console-error">console.error</option>
      <option value="manual">Manual Log</option>
    </select>
    <select id="filter-severity" onchange="renderErrors()">
      <option value="">All Severity</option>
      <option value="error">Errors</option>
      <option value="warn">Warnings</option>
    </select>
    <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);cursor:pointer">
      <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()" checked>
      Auto-refresh (5s)
    </label>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <h3 id="detail-title">Error Details</h3>
    <div id="detail-body"></div>
  </div>

  <!-- Error list -->
  <div id="error-list"></div>

  <div class="footer">
    <a href="#" onclick="backToTool();return false" style="color:var(--accent)">← Back to tool</a> ·
    <span style="color:var(--muted)">Debug Console v1.0</span>
  </div>
</div>

<script>
// ===== DEBUG CONSOLE — Error Log Viewer =====

const STORAGE_KEY = 'security-tools:error-log';

function getLog() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}

function getToolName() {
  return 'Debug Console';
}

// Auto-refresh
let autoRefreshTimer = null;
function toggleAutoRefresh() {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  if (document.getElementById('auto-refresh').checked) {
    autoRefreshTimer = setInterval(refreshLog, 5000);
  }
}

// Summary
function renderSummary(log) {
  const total = log.length;
  const runtime = log.filter(e => e.type === 'runtime-error').length;
  const rejections = log.filter(e => e.type === 'unhandled-rejection').length;
  const consoleErrors = log.filter(e => e.type === 'console-error').length;
  const manuals = log.filter(e => e.type === 'manual').length;

  document.getElementById('summary').innerHTML =
    `<div class="stat-card"><div class="num" style="color:var(--text)">${total}</div><div class="lbl">Total Events</div></div>` +
    `<div class="stat-card"><div class="num" style="color:var(--critical)">${runtime}</div><div class="lbl">Runtime Errors</div></div>` +
    `<div class="stat-card"><div class="num" style="color:var(--high)">${rejections + consoleErrors}</div><div class="lbl">Rejections + Console</div></div>` +
    `<div class="stat-card"><div class="num" style="color:var(--accent)">${manuals}</div><div class="lbl">Manual Logs</div></div>`;

  document.getElementById('log-count').textContent = `${total} event(s)`;
}

// Filters
function populateToolFilter(log) {
  const tools = [...new Set(log.map(e => e.tool).filter(Boolean))];
  const sel = document.getElementById('filter-tool');
  const current = sel.value;
  sel.innerHTML = '<option value="">All Tools</option>';
  tools.sort().forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });
  sel.value = current;
}

// Error rendering
function renderErrors() {
  let log = getLog();
  const toolFilter = document.getElementById('filter-tool').value;
  const typeFilter = document.getElementById('filter-type').value;
  const severityFilter = document.getElementById('filter-severity').value;

  if (toolFilter) log = log.filter(e => e.tool === toolFilter);
  if (typeFilter) log = log.filter(e => e.type === typeFilter);
  if (severityFilter === 'error') log = log.filter(e => e.type === 'runtime-error' || e.type === 'unhandled-rejection');
  if (severityFilter === 'warn') log = log.filter(e => e.type === 'console-error' || e.type === 'manual');

  renderSummary(log);

  if (log.length === 0) {
    document.getElementById('error-list').innerHTML =
      '<div class="empty-state"><div class="icon">✅</div><p>No errors caught</p><div class="sub">Errors from any tool will appear here automatically</div></div>';
    return;
  }

  const reversed = [...log].reverse();
  let html = '<table class="error-table"><thead><tr><th>#</th><th>Type</th><th>Tool</th><th>Message</th><th>When</th></tr></thead><tbody>';

  reversed.forEach((e, i) => {
    const idx = log.length - i;
    const typeClass = e.type === 'runtime-error' || e.type === 'unhandled-rejection' ? 'error-msg' : 'error-msg warn';
    const typeLabel = e.type === 'runtime-error' ? '💥 Runtime' : e.type === 'unhandled-rejection' ? '⚠️ Promise' : e.type === 'console-error' ? '📝 Console' : '📋 Manual';
    const time = e.timestamp ? new Date(e.timestamp).toLocaleString() : '—';
    const msg = (e.message || '—').slice(0, 200);
    const hasStack = e.stack && e.stack.length > 5;

    html += `<tr onclick="toggleDetail(${i})" style="cursor:pointer">`;
    html += `<td style="color:var(--muted)">${idx}</td>`;
    html += `<td><span class="${typeClass}">${typeLabel}</span></td>`;
    html += `<td style="color:var(--muted)">${e.tool || '—'}</td>`;
    html += `<td><div class="${typeClass}">${escapeHtml(msg)}</div>`;
    if (hasStack) html += `<div class="error-meta">${e.source || ''}${e.line ? ':'+e.line : ''}${e.col ? ':'+e.col : ''}</div>`;
    html += `</td>`;
    html += `<td style="font-size:10px;color:var(--muted);white-space:nowrap">${time}</td>`;
    html += `</tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('error-list').innerHTML = html;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleDetail(idx) {
  const log = getLog();
  const reversed = [...log].reverse();
  const e = reversed[idx];
  if (!e) return;

  const panel = document.getElementById('detail-panel');
  panel.classList.toggle('visible');

  if (panel.classList.contains('visible')) {
    document.getElementById('detail-title').textContent = `#${log.length - idx} — ${e.tool || 'Unknown'} · ${e.type || 'event'}`;
    document.getElementById('detail-body').innerHTML =
      `<div class="row"><div class="label">Type</div><div class="value">${escapeHtml(e.type)}</div></div>` +
      `<div class="row"><div class="label">Tool</div><div class="value">${escapeHtml(e.tool)}</div></div>` +
      `<div class="row"><div class="label">Time</div><div class="value">${e.timestamp ? new Date(e.timestamp).toISOString() : '—'}</div></div>` +
      `<div class="row"><div class="label">URL</div><div class="value">${escapeHtml(e.url)}</div></div>` +
      `<div class="row"><div class="label">Message</div><div class="value long">${escapeHtml(e.message)}</div></div>` +
      (e.source ? `<div class="row"><div class="label">Source</div><div class="value">${escapeHtml(e.source)}${e.line ? ':'+e.line : ''}${e.col ? ':'+e.col : ''}</div></div>` : '') +
      (e.stack ? `<div class="row"><div class="label">Stack</div><div class="value long">${escapeHtml(e.stack)}</div></div>` : '') +
      (e.data ? `<div class="row"><div class="label">Data</div><div class="value long">${escapeHtml(e.data)}</div></div>` : '') +
      (e.userAgent ? `<div class="row"><div class="label">UA</div><div class="value" style="font-size:10px">${escapeHtml(e.userAgent)}</div></div>` : '') +
      `<div class="row" style="margin-top:12px"><div class="label">Raw JSON</div></div>` +
      `<div class="value long" style="margin-top:4px;font-size:10px">${escapeHtml(JSON.stringify(e, null, 2))}</div>`;
  }
}

function refreshLog() {
  const log = getLog();
  populateToolFilter(log);
  renderErrors();
}

function clearLog() {
  if (!confirm('Clear all error log entries? This affects all tools.')) return;
  localStorage.removeItem(STORAGE_KEY);
  refreshLog();
}

function downloadLog() {
  const log = getLog();
  if (log.length === 0) { alert('No log entries to download.'); return; }
  const blob = new Blob([JSON.stringify(log, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `error-log-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function backToTool() {
  // Go to the tool's main page (strip debug.html)
  var path = location.pathname.replace(/\/debug\.html$/, '/');
  location.href = path;
}

// Init
refreshLog();
toggleAutoRefresh();
</script>
</body>
</html>
